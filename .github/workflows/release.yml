name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release zip
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release version
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          SYSTEM_VERSION="$(node -p "require('./system.json').version")"
          SYSTEM_DOWNLOAD="$(node -p "require('./system.json').download")"
          EXPECTED_DOWNLOAD="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${SYSTEM_VERSION}/tirakan-essential-foundry-${SYSTEM_VERSION}.zip"

          if ! echo "${TAG_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag (${TAG_NAME}) must be the release version prefixed with v, for example v0.3.2." >&2
            exit 1
          fi

          if [ "${PACKAGE_VERSION}" != "${SYSTEM_VERSION}" ]; then
            echo "package.json version (${PACKAGE_VERSION}) does not match system.json version (${SYSTEM_VERSION})." >&2
            exit 1
          fi

          if [ "${TAG_VERSION}" != "${SYSTEM_VERSION}" ]; then
            echo "Tag (${TAG_NAME}) does not match manifest version (${SYSTEM_VERSION})." >&2
            exit 1
          fi

          if [ "${SYSTEM_DOWNLOAD}" != "${EXPECTED_DOWNLOAD}" ]; then
            echo "system.json download URL (${SYSTEM_DOWNLOAD}) does not match expected release asset URL (${EXPECTED_DOWNLOAD})." >&2
            exit 1
          fi

          echo "version=${SYSTEM_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build system archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="tirakan-essential-foundry-${VERSION}.zip"

          zip -r "${ZIP_NAME}" \
            LICENSE \
            README.md \
            package.json \
            system.json \
            tirakan-essential-foundry.mjs \
            lang \
            module \
            styles \
            templates

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: tirakan-essential-foundry-${{ steps.version.outputs.version }}.zip
          name: ${{ steps.version.outputs.version }}
